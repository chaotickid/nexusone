<!DOCTYPE html>
<html lang="en" data-theme="night">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus One - Expense & Capital Ledger</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    .title-bar { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    .glass-panel {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 10px; }
  </style>
</head>

<body class="glass-panel text-base-content h-screen w-screen flex flex-col font-sans select-none overflow-hidden border border-white/10">

  <div class="title-bar h-12 bg-base-300/60 flex items-center justify-between px-6 border-b border-white/5 flex-shrink-0 w-full">
    <span class="text-[10px] font-black tracking-[0.3em] text-accent uppercase">NEXUS ONE // FINANCE CORE</span>
    <div class="flex items-center no-drag">
      <button onclick="ipcRenderer.send('window-minimize')" class="btn btn-ghost btn-sm font-bold rounded-none h-12 w-12">─</button>
      <button onclick="ipcRenderer.send('window-close')" class="btn btn-ghost btn-sm text-error/70 hover:bg-error hover:text-white font-bold rounded-none h-12 w-12 transition-colors">✕</button>
    </div>
  </div>

  <div class="p-6 flex flex-col flex-grow overflow-hidden w-full h-full animate__animated animate__fadeIn">
    
    <div class="flex justify-between items-center mb-4 w-full flex-shrink-0">
      <div class="flex items-center gap-4">
        <button onclick="window.location.href='hub.html'" class="btn btn-neutral h-12 rounded-xl text-xs font-bold border border-white/5 px-4 no-drag">
          &larr; Exit to Hub
        </button>
        <div>
          <h2 class="text-2xl font-black tracking-tight text-white">Financial Asset Ledger</h2>
          <p class="text-xs opacity-40 mt-0.5">Track and maintain real-time persistent Credit (Incoming) & Debit (Outgoing) transactions</p>
        </div>
      </div>

      <div class="flex gap-3 no-drag">
        <div class="bg-base-200/40 border border-white/5 px-4 py-1.5 rounded-xl flex flex-col items-end justify-center">
          <span class="text-[9px] opacity-40 uppercase font-bold tracking-wider">Net Balance</span>
          <span id="stat-balance" class="text-lg font-black text-white font-mono">₹0.00</span>
        </div>
        <div class="bg-success/5 border border-success/20 px-4 py-1.5 rounded-xl flex flex-col items-end justify-center">
          <span class="text-[9px] text-success opacity-60 uppercase font-bold tracking-wider">Total Credited</span>
          <span id="stat-credit" class="text-lg font-black text-success font-mono">₹0.00</span>
        </div>
        <div class="bg-error/5 border border-error/20 px-4 py-1.5 rounded-xl flex flex-col items-end justify-center">
          <span class="text-[9px] text-error opacity-60 uppercase font-bold tracking-wider">Total Debited</span>
          <span id="stat-debit" class="text-lg font-black text-error font-mono">₹0.00</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col flex-grow overflow-hidden w-full gap-4">
      
      <div class="bg-base-200/40 border border-white/5 rounded-xl p-4 flex flex-wrap lg:flex-nowrap items-end gap-3 no-drag flex-shrink-0">
        <div class="form-control w-full lg:w-44 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] opacity-60 font-bold uppercase tracking-wider">Flow Type</span></label>
          <select id="exp-type" class="select select-sm select-bordered w-full bg-base-200/50 border-white/5 text-sm rounded-lg focus:border-accent/50 text-white font-bold">
            <option value="DEBIT" class="text-error font-bold">Debit (Spent)</option>
            <option value="CREDIT" class="text-success font-bold">Credit (Added)</option>
          </select>
        </div>

        <div class="form-control flex-grow min-w-[200px]">
          <label class="label py-0.5"><span class="label-text text-[10px] opacity-60 font-bold uppercase tracking-wider">Description / Reference Title</span></label>
          <input type="text" id="exp-item" placeholder="Salary, Client Payout, Office rent, Server cost..." class="input input-sm input-bordered w-full bg-base-200/50 border-white/5 text-sm rounded-lg focus:border-accent/50 text-white" />
        </div>

        <div class="form-control w-full lg:w-44 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] opacity-60 font-bold uppercase tracking-wider">Amount (₹)</span></label>
          <input type="number" id="exp-amount" placeholder="0.00" class="input input-sm input-bordered w-full bg-base-200/50 border-white/5 text-sm rounded-lg focus:border-accent/50 font-mono text-white" />
        </div>

        <div class="form-control w-full lg:w-44 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] opacity-60 font-bold uppercase tracking-wider">Date</span></label>
          <input type="date" id="exp-date" class="input input-sm input-bordered w-full bg-base-200/50 border-white/5 text-sm rounded-lg focus:border-accent/50 text-center text-white font-mono" />
        </div>

        <button onclick="addExpenseRecord()" class="btn btn-sm btn-accent rounded-lg text-xs font-black shadow-lg shadow-accent/10 px-6 h-9">
          Commit Entry
        </button>
      </div>

      <div class="bg-base-300/40 border border-white/5 rounded-xl p-4 flex flex-wrap items-end gap-3 no-drag flex-shrink-0">
        <div class="form-control flex-grow min-w-[150px]">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">Filter: Description</span></label>
          <input type="text" id="filter-name" oninput="applyFilters()" placeholder="Search description..." class="input input-sm input-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg" />
        </div>

        <div class="form-control w-36 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">Flow Type</span></label>
          <select id="filter-type" onchange="applyFilters()" class="select select-sm select-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg text-white font-semibold">
            <option value="ALL">All Types</option>
            <option value="CREDIT">Credits Only</option>
            <option value="DEBIT">Debits Only</option>
          </select>
        </div>

        <div class="form-control w-32 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">Min Amount</span></label>
          <input type="number" id="filter-min-amount" oninput="applyFilters()" placeholder="0" class="input input-sm input-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg font-mono" />
        </div>

        <div class="form-control w-32 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">Max Amount</span></label>
          <input type="number" id="filter-max-amount" oninput="applyFilters()" placeholder="Max" class="input input-sm input-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg font-mono" />
        </div>

        <div class="form-control w-36 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">Start Date</span></label>
          <input type="date" id="filter-start-date" onchange="applyFilters()" class="input input-sm input-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg text-center font-mono" />
        </div>

        <div class="form-control w-36 flex-shrink-0">
          <label class="label py-0.5"><span class="label-text text-[10px] text-accent font-bold uppercase tracking-wider">End Date</span></label>
          <input type="date" id="filter-end-date" onchange="applyFilters()" class="input input-sm input-bordered w-full bg-base-950/40 border-white/5 text-xs rounded-lg text-center font-mono" />
        </div>

        <button onclick="clearFilterInputs()" class="btn btn-sm btn-outline btn-neutral rounded-lg text-xs font-bold px-4 h-9 border-white/10">
          Reset Filters
        </button>
      </div>

      <div class="flex-grow flex flex-col border border-white/5 bg-base-300/20 backdrop-blur-md rounded-2xl overflow-hidden min-h-0">
        <div class="overflow-auto flex-grow">
          <table class="table w-full table-fixed border-collapse">
            <colgroup>
              <col style="width: 70px;">
              <col style="width: 120px;">
              <col style="width: 440px;">
              <col style="width: 180px;">
              <col style="width: 160px;">
              <col style="width: 80px;">
            </colgroup>
            <thead>
              <tr class="bg-base-950 text-accent border-b border-white/5 font-black text-[11px] uppercase tracking-wider text-center h-11 sticky top-0 z-10">
                <th>Index</th>
                <th>Type</th>
                <th class="text-left pl-4">Description / Reference</th>
                <th>Transaction Amount</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="expense-table-body" class="text-center font-medium text-sm">
              </tbody>
          </table>
        </div>

        <div class="bg-base-950/60 border-t border-white/5 px-6 py-3 flex items-center justify-between flex-shrink-0 no-drag">
          <div class="text-xs opacity-50 font-medium">
            Showing <span id="page-start-idx" class="text-white font-bold">0</span> to <span id="page-end-idx" class="text-white font-bold">0</span> of <span id="page-total-count" class="text-white font-bold">0</span> entries
          </div>
          <div class="join">
            <button onclick="prevPage()" id="btn-prev" class="join-item btn btn-xs btn-neutral border border-white/5 px-3">Previous</button>
            <button id="page-indicator" class="join-item btn btn-xs btn-neutral border border-white/5 no-animation pointer-events-none px-4 text-accent font-bold">Page 1</button>
            <button onclick="nextPage()" id="btn-next" class="join-item btn btn-xs btn-neutral border border-white/5 px-3">Next</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const fs = require('fs');
    const path = require('path');
    const { ipcRenderer } = require('electron');

    let expenseLedgerArray = [];
    let filteredLedgerArray = []; 
    let EXPENSE_FILE_PATH;

    // Pagination Settings
    let currentPage = 1;
    const rowsPerPage = 8; 

    // Initialize application storage hooks
    ipcRenderer.invoke("get-user-data-path").then((userDataPath) => {
      EXPENSE_FILE_PATH = path.join(userDataPath, 'expenses.json');
      
      if (!fs.existsSync(EXPENSE_FILE_PATH)) {
        fs.writeFileSync(EXPENSE_FILE_PATH, JSON.stringify([], null, 2), 'utf-8');
      }

      try {
        expenseLedgerArray = JSON.parse(fs.readFileSync(EXPENSE_FILE_PATH, 'utf-8'));
      } catch (e) {
        expenseLedgerArray = [];
      }

      document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
      applyFilters(); 
    });

    function applyFilters() {
      const searchName = document.getElementById('filter-name').value.toLowerCase().trim();
      const searchType = document.getElementById('filter-type').value;
      const minAmt = parseFloat(document.getElementById('filter-min-amount').value) || 0;
      const maxAmt = parseFloat(document.getElementById('filter-max-amount').value) || Infinity;
      const startDate = document.getElementById('filter-start-date').value;
      const endDate = document.getElementById('filter-end-date').value;

      filteredLedgerArray = expenseLedgerArray.filter(item => {
        const matchesName = item.itemName ? item.itemName.toLowerCase().includes(searchName) : false;
        const matchesType = (searchType === 'ALL' || item.type === searchType);
        const itemAmt = parseFloat(item.amount) || 0;
        const matchesAmount = (itemAmt >= minAmt && itemAmt <= maxAmt);
        
        let matchesDate = true;
        if (startDate) matchesDate = matchesDate && (item.date >= startDate);
        if (endDate) matchesDate = matchesDate && (item.date <= endDate);

        return matchesName && matchesType && matchesAmount && matchesDate;
      });

      renderExpenseGridUI();
    }

    function clearFilterInputs() {
      document.getElementById('filter-name').value = '';
      document.getElementById('filter-type').value = 'ALL';
      document.getElementById('filter-min-amount').value = '';
      document.getElementById('filter-max-amount').value = '';
      document.getElementById('filter-start-date').value = '';
      document.getElementById('filter-end-date').value = '';
      applyFilters();
    }

    function renderExpenseGridUI() {
      const tbody = document.getElementById('expense-table-body');
      tbody.innerHTML = '';
      
      // Calculate dynamic summaries based on full unfiltered arrays for true historical metrics
      let totalCredited = expenseLedgerArray.filter(i => i.type === 'CREDIT').reduce((acc, curr) => acc + (imgAmt(curr.amount)), 0);
      let totalDebited = expenseLedgerArray.filter(i => i.type === 'DEBIT').reduce((acc, curr) => acc + (imgAmt(curr.amount)), 0);
      let netBalance = totalCredited - totalDebited;

      document.getElementById('stat-credit').innerText = `₹${totalCredited.toFixed(2)}`;
      document.getElementById('stat-debit').innerText = `₹${totalDebited.toFixed(2)}`;
      
      const balElement = document.getElementById('stat-balance');
      balElement.innerText = `₹${netBalance.toFixed(2)}`;
      if(netBalance < 0) {
        balElement.className = "text-lg font-black font-mono text-error";
      } else {
        balElement.className = "text-lg font-black font-mono text-success";
      }

      const totalItems = filteredLedgerArray.length;
      const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;

      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const startIndex = (currentPage - 1) * rowsPerPage;
      const endIndex = Math.min(startIndex + rowsPerPage, totalItems);

      const itemsToDisplay = filteredLedgerArray.slice(startIndex, endIndex);

      if (itemsToDisplay.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="text-center py-12 opacity-30 text-xs italic tracking-wider">
              No matching records found in storage history.
            </td>
          </tr>`;
      } else {
        itemsToDisplay.forEach((item, index) => {
          const actualGlobalIndex = expenseLedgerArray.findIndex(origItem => origItem === item);
          const computedViewIndex = startIndex + index;
          
          const isCredit = (item.type === 'CREDIT');
          const typeBadge = isCredit 
            ? `<span class="badge badge-success text-success-content font-black text-[10px] tracking-wider px-2 py-1">CREDIT</span>` 
            : `<span class="badge badge-error text-error-content font-black text-[10px] tracking-wider px-2 py-1">DEBIT</span>`;
            
          const amountDisplay = isCredit 
            ? `<span class="text-success font-black font-mono">+ ₹${Number(item.amount).toFixed(2)}</span>` 
            : `<span class="text-error font-black font-mono">- ₹${Number(item.amount).toFixed(2)}</span>`;

          const tr = document.createElement('tr');
          tr.className = "hover:bg-base-200/30 transition-colors border-b border-white/5 h-11 text-center animate__animated animate__fadeIn animate__faster";
          tr.innerHTML = `
            <th class="font-mono text-xs opacity-50 bg-base-900/40 text-center p-0">${computedViewIndex + 1}</th>
            <td class="p-1">${typeBadge}</td>
            <td class="p-1 text-left font-bold pl-4 text-white truncate">${item.itemName || ''}</td>
            <td class="p-1">${amountDisplay}</td>
            <td class="p-1 font-mono text-xs text-primary font-bold">${item.date || ''}</td>
            <td class="p-0 text-center">
              <button onclick="removeExpenseRecord(${actualGlobalIndex})" class="btn btn-ghost btn-xs btn-square text-error/60 hover:text-error hover:bg-error/10 rounded-lg no-drag">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('page-start-idx').innerText = totalItems === 0 ? 0 : startIndex + 1;
      document.getElementById('page-end-idx').innerText = endIndex;
      document.getElementById('page-total-count').innerText = totalItems;
      document.getElementById('page-indicator').innerText = `Page ${currentPage} / ${totalPages}`;

      document.getElementById('btn-prev').disabled = (currentPage === 1);
      document.getElementById('btn-next').disabled = (currentPage === totalPages);
    }

    function imgAmt(v) {
      return Number(v) || 0;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderExpenseGridUI();
      }
    }

    function nextPage() {
      const totalPages = Math.ceil(filteredLedgerArray.length / rowsPerPage) || 1;
      if (currentPage < totalPages) {
        currentPage++;
        renderExpenseGridUI();
      }
    }

    function addExpenseRecord() {
      const type = document.getElementById('exp-type').value;
      const itemName = document.getElementById('exp-item').value.trim();
      const amount = document.getElementById('exp-amount').value.trim();
      const date = document.getElementById('exp-date').value;

      // FIXED: Safely highlights parameters if missing fields without freezing input tabs interactivity 
      if (!itemName || !amount || !date) {
        alert("Please complete all fields before tracking the entry.");
        return;
      }

      expenseLedgerArray.push({
        type,
        itemName,
        amount: parseFloat(amount),
        date
      });

      // Synchronously write directly into local persistent user data JSON
      fs.writeFileSync(EXPENSE_FILE_PATH, JSON.stringify(expenseLedgerArray, null, 2), 'utf-8');
      
      // Clean inputs safely
      document.getElementById('exp-item').value = '';
      document.getElementById('exp-amount').value = '';
      
      applyFilters();
      currentPage = Math.ceil(filteredLedgerArray.length / rowsPerPage) || 1;
      renderExpenseGridUI();
    }

    function removeExpenseRecord(globalIndex) {
      if (globalIndex > -1) {
        expenseLedgerArray.splice(globalIndex, 1);
        fs.writeFileSync(EXPENSE_FILE_PATH, JSON.stringify(expenseLedgerArray, null, 2), 'utf-8');
        applyFilters();
      }
    }
  </script>
</body>
</html>
